    <!-- Navigation Script -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Mobile nav toggle
        (function() {
          var navToggle = document.getElementById("navToggle");
          var navClose = document.getElementById("navClose");
          var mobileOverlay = document.getElementById("mobileOverlay");
          var overlayLinks = document.querySelectorAll(".navigation-overlay-link");

          var openMenu = function() {
            mobileOverlay.classList.add("is-active");
            navToggle.setAttribute("aria-expanded", "true");
            document.body.style.overflow = "hidden";
          };

          var closeMenu = function() {
            mobileOverlay.classList.remove("is-active");
            navToggle.setAttribute("aria-expanded", "false");
            document.body.style.overflow = "";
          };

          navToggle.addEventListener("click", openMenu);
          navClose.addEventListener("click", closeMenu);
          overlayLinks.forEach(function(link) { link.addEventListener("click", closeMenu); });
          window.addEventListener("keydown", function(e) {
            if (e.key === "Escape" && mobileOverlay.classList.contains("is-active")) closeMenu();
          });

          // Scroll shadow
          var nav = document.querySelector(".navigation-container");
          window.addEventListener("scroll", function() {
            if (window.pageYOffset > 50) {
              nav.style.boxShadow = "0 4px 20px rgba(0, 0, 0, 0.05)";
            } else {
              nav.style.boxShadow = "none";
            }
          });
        })();

        // Load articles with search & pagination
        (function() {
          var PER_PAGE = 10;
          var allArticles = [];
          var filteredArticles = [];
          var currentPage = 1;
          var sortDesc = true; // default: newest first

          var list = document.getElementById('articleList');
          var empty = document.getElementById('emptyState');
          var searchInput = document.getElementById('searchInput');
          var pagination = document.getElementById('pagination');
          var prevBtn = document.getElementById('prevBtn');
          var nextBtn = document.getElementById('nextBtn');
          var pageNumbers = document.getElementById('pageNumbers');
          var sortBtn = document.getElementById('sortBtn');

          function sortArticles(articles) {
            return articles.slice().sort(function(a, b) {
              var da = new Date(a.date).getTime();
              var db = new Date(b.date).getTime();
              return sortDesc ? db - da : da - db;
            });
          }

          fetch('/rehearse/articles.json')
            .then(function(r) { return r.json(); })
            .then(function(articles) {
              allArticles = articles;
              filteredArticles = sortArticles(allArticles);
              if (!allArticles.length) {
                empty.style.display = 'block';
                return;
              }
              renderPage();
            })
            .catch(function() {
              empty.style.display = 'block';
            });

          function renderPage() {
            var totalPages = Math.ceil(filteredArticles.length / PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            var start = (currentPage - 1) * PER_PAGE;
            var end = start + PER_PAGE;
            var pageItems = filteredArticles.slice(start, end);

            list.innerHTML = '';

            if (!filteredArticles.length) {
              empty.style.display = 'block';
              empty.querySelector('p').textContent = 'No articles match your search.';
              pagination.style.display = 'none';
              return;
            }

            empty.style.display = 'none';

            pageItems.forEach(function(a, i) {
              var item = document.createElement('a');
              item.href = a.filename;
              item.className = 'rehearse-item rehearse-fade-in';
              item.style.transitionDelay = (i * 0.06) + 's';
              item.innerHTML =
                '<div class="rehearse-item-number">' + String(a.id).padStart(2, '0') + '</div>' +
                '<div class="rehearse-item-info">' +
                  '<div class="rehearse-item-title">' + a.title + '</div>' +
                  '<div class="rehearse-item-abstract">' + a.abstract + '</div>' +
                '</div>' +
                '<div class="rehearse-item-date">' + formatDate(a.date) + '</div>';
              list.appendChild(item);
            });

            // Fade-in
            requestAnimationFrame(function() {
              document.querySelectorAll('.rehearse-fade-in').forEach(function(el) {
                el.classList.add('is-visible');
              });
            });

            // Pagination
            if (totalPages <= 1) {
              pagination.style.display = 'none';
              return;
            }

            pagination.style.display = 'flex';
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            pageNumbers.innerHTML = '';
            for (var p = 1; p <= totalPages; p++) {
              var btn = document.createElement('button');
              btn.className = 'rehearse-page-num' + (p === currentPage ? ' is-active' : '');
              btn.textContent = p;
              btn.setAttribute('data-page', p);
              pageNumbers.appendChild(btn);
            }
          }

          // Search
          var searchTimer;
          searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() {
              var q = searchInput.value.trim().toLowerCase();
              if (!q) {
                filteredArticles = sortArticles(allArticles);
              } else {
                filteredArticles = sortArticles(allArticles).filter(function(a) {
                  return a.title.toLowerCase().indexOf(q) !== -1 ||
                         a.abstract.toLowerCase().indexOf(q) !== -1;
                });
              }
              currentPage = 1;
              renderPage();
            }, 200);
          });

          // Sort toggle
          sortBtn.addEventListener('click', function() {
            sortDesc = !sortDesc;
            sortBtn.classList.toggle('is-desc', sortDesc);
            sortBtn.classList.toggle('is-asc', !sortDesc);

            var q = searchInput.value.trim().toLowerCase();
            if (!q) {
              filteredArticles = sortArticles(allArticles);
            } else {
              filteredArticles = sortArticles(allArticles).filter(function(a) {
                return a.title.toLowerCase().indexOf(q) !== -1 ||
                       a.abstract.toLowerCase().indexOf(q) !== -1;
              });
            }
            currentPage = 1;
            renderPage();
          });

          // Pagination clicks
          prevBtn.addEventListener('click', function() {
            currentPage--;
            renderPage();
            window.scrollTo({ top: pagination.offsetTop - 100, behavior: 'smooth' });
          });

          nextBtn.addEventListener('click', function() {
            currentPage++;
            renderPage();
            window.scrollTo({ top: pagination.offsetTop - 100, behavior: 'smooth' });
          });

          pageNumbers.addEventListener('click', function(e) {
            if (e.target.classList.contains('rehearse-page-num')) {
              currentPage = parseInt(e.target.getAttribute('data-page'), 10);
              renderPage();
              window.scrollTo({ top: pagination.offsetTop - 100, behavior: 'smooth' });
            }
          });

          function formatDate(dateStr) {
            var parts = dateStr.split('-');
            var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
          }
        })();
      });
